<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
<div th:replace="layout :: navbar"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 th:text="${titulo}">Lista de Ventas</h1>
        <a th:href="@{/web/ventas/nueva}" class="btn btn-primary">
            <i class="fas fa-plus"></i> Nueva Venta
        </a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>Código</th>
                <th>Fecha</th>
                <th>Cliente</th>
                <th>Usuario</th>
                <th>Total</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="venta : ${ventas}">
                <td th:text="${venta.codigoVenta}">1</td>
                <td th:text="${#temporals.format(venta.fechaVenta, 'dd/MM/yyyy')}">01/01/2024</td>
                <td th:text="${venta.cliente.nombreCliente + ' ' + venta.cliente.apellidoCliente}">Cliente</td>
                <td th:text="${venta.usuario.username}">Usuario</td>
                <td th:text="${'Q' + venta.total}">Q100.00</td>
                <td>
                    <span th:if="${venta.estado == 1}" class="badge bg-success">Activo</span>
                    <span th:if="${venta.estado == 0}" class="badge bg-danger">Inactivo</span>
                </td>
                <td>
                    <a th:href="@{/web/ventas/editar/{codigo}(codigo=${venta.codigoVenta})}"
                       class="btn btn-sm btn-warning">
                        <i class="fas fa-edit"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${ventas.empty}">
                <td colspan="7" class="text-center">No hay ventas registradas</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="layout :: footer"></div>
<div th:replace="layout :: scripts"></div>
</body>
</html>
