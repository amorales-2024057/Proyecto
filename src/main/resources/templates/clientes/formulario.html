<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
<div th:replace="layout :: navbar"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3 th:text="${titulo}">Formulario</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{${accion == 'guardar' ? '/web/clientes/guardar' : '/web/clientes/actualizar/' + cliente.dpiCliente}}"
                          th:object="${cliente}" method="post">

                        <div class="mb-3">
                            <label for="dpiCliente" class="form-label">DPI</label>
                            <input type="text" class="form-control" id="dpiCliente"
                                   th:field="*{dpiCliente}"
                                   th:readonly="${accion == 'actualizar'}">
                        </div>

                        <div class="mb-3">
                            <label for="nombreCliente" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombreCliente"
                                   th:field="*{nombreCliente}" required>
                        </div>

                        <div class="mb-3">
                            <label for="apellidoCliente" class="form-label">Apellido</label>
                            <input type="text" class="form-control" id="apellidoCliente"
                                   th:field="*{apellidoCliente}" required>
                        </div>

                        <div class="mb-3">
                            <label for="direccion" class="form-label">Dirección</label>
                            <input type="text" class="form-control" id="direccion"
                                   th:field="*{direccion}" required>
                        </div>

                        <div class="mb-3">
                            <label for="estado" class="form-label">Estado</label>
                            <select class="form-control" id="estado" th:field="*{estado}">
                                <option th:value="1">Activo</option>
                                <option th:value="0">Inactivo</option>
                            </select>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Guardar
                            </button>
                            <a th:href="@{/web/clientes}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="layout :: footer"></div>
<div th:replace="layout :: scripts"></div>
</body>
</html>
