<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head">
    <meta charset="UTF-8">
    <title>Lista de Clientes</title>
</head>
<body>
<div th:replace="layout :: navbar"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 th:text="${titulo}">Lista de Clientes</h1>
        <a th:href="@{/web/clientes/nuevo}" class="btn btn-primary">
            <i class="fas fa-plus"></i> Nuevo Cliente
        </a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>DPI</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Dirección</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cliente : ${clientes}">
                <td th:text="${cliente.dpiCliente}">1234567890101</td>
                <td th:text="${cliente.nombreCliente}">Juan</td>
                <td th:text="${cliente.apellidoCliente}">Pérez</td>
                <td th:text="${cliente.direccion}">Ciudad</td>
                <td>
                    <span th:if="${cliente.estado == 1}" class="badge bg-success">Activo</span>
                    <span th:if="${cliente.estado == 0}" class="badge bg-danger">Inactivo</span>
                </td>
                <td>
                    <a th:href="@{/web/clientes/editar/{dpi}(dpi=${cliente.dpiCliente})}"
                       class="btn btn-sm btn-warning">
                        <i class="fas fa-edit"></i>
                    </a>
                    <a th:href="@{/web/clientes/eliminar/{dpi}(dpi=${cliente.dpiCliente})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Estás seguro de eliminar este cliente?')">
                        <i class="fas fa-trash"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${clientes.empty}">
                <td colspan="6" class="text-center">No hay clientes registrados</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="layout :: footer"></div>
<div th:replace="layout :: scripts"></div>
</body>
</html>
