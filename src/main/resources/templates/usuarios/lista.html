<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
<div th:replace="layout :: navbar"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 th:text="${titulo}">Lista de Usuarios</h1>
        <a th:href="@{/web/usuarios/nuevo}" class="btn btn-primary">
            <i class="fas fa-plus"></i> Nuevo Usuario
        </a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>Código</th>
                <th>Username</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="usuario : ${usuarios}">
                <td th:text="${usuario.codigoUsuario}">1</td>
                <td th:text="${usuario.username}">jperez</td>
                <td th:text="${usuario.email}">jperez@email.com</td>
                <td>
                    <span th:if="${usuario.rol == 'ADMIN'}" class="badge bg-danger">ADMIN</span>
                    <span th:if="${usuario.rol == 'VENDEDOR'}" class="badge bg-primary">VENDEDOR</span>
                    <span th:if="${usuario.rol == 'INVENTARIO'}" class="badge bg-info">INVENTARIO</span>
                </td>
                <td>
                    <span th:if="${usuario.estado == 1}" class="badge bg-success">Activo</span>
                    <span th:if="${usuario.estado == 0}" class="badge bg-danger">Inactivo</span>
                </td>
                <td>
                    <a th:href="@{/web/usuarios/editar/{codigo}(codigo=${usuario.codigoUsuario})}"
                       class="btn btn-sm btn-warning">
                        <i class="fas fa-edit"></i>
                    </a>
                    <a th:href="@{/web/usuarios/eliminar/{codigo}(codigo=${usuario.codigoUsuario})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Estás seguro de eliminar este usuario?')">
                        <i class="fas fa-trash"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${usuarios.empty}">
                <td colspan="6" class="text-center">No hay usuarios registrados</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="layout :: footer"></div>
<div th:replace="layout :: scripts"></div>
</body>
</html>
