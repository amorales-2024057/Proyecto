<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
<div th:replace="layout :: navbar"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3 th:text="${titulo}">Formulario de Usuario</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{${accion == 'guardar' ? '/web/usuarios/guardar' : '/web/usuarios/actualizar/' + usuario.codigoUsuario}}"
                          th:object="${usuario}" method="post">

                        <div class="mb-3" th:if="${accion == 'actualizar'}">
                            <label class="form-label">Código</label>
                            <input type="text" class="form-control" th:value="*{codigoUsuario}" readonly>
                        </div>

                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username"
                                   th:field="*{username}" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="password"
                                   th:field="*{password}" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email"
                                   th:field="*{email}" required>
                        </div>

                        <div class="mb-3">
                            <label for="rol" class="form-label">Rol</label>
                            <select class="form-control" id="rol" th:field="*{rol}" required>
                                <option value="">Seleccione un rol...</option>
                                <option value="ADMIN">Administrador</option>
                                <option value="VENDEDOR">Vendedor</option>
                                <option value="INVENTARIO">Inventario</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="estado" class="form-label">Estado</label>
                            <select class="form-control" id="estado" th:field="*{estado}">
                                <option th:value="1">Activo</option>
                                <option th:value="0">Inactivo</option>
                            </select>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Guardar
                            </button>
                            <a th:href="@{/web/usuarios}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="layout :: footer"></div>
<div th:replace="layout :: scripts"></div>
</body>
</html>
