<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KinalApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 193, 7, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 80%, rgba(255, 193, 7, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .login-card {
            background: #1e2a3a;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
            margin: 20px;
            border: 1px solid rgba(255, 193, 7, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.6s ease-out;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 193, 7, 0.4);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            border-bottom: 3px solid #ffc107;
        }

        .login-header::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: #ffc107;
            border-radius: 2px;
        }

        .login-header i {
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
            animation: float 3s ease-in-out infinite;
            color: #ffc107;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .login-header h2 {
            font-weight: 700;
            margin-top: 15px;
            letter-spacing: 1px;
            color: white;
        }

        .login-header p {
            opacity: 0.8;
            margin-top: 5px;
            font-size: 14px;
            color: #cbd5e0;
        }

        .login-body {
            padding: 40px;
            background: #1e2a3a;
        }

        .form-label {
            font-weight: 600;
            color: #ffc107;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group {
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid #2d3a4a;
            background: #0f172a;
        }

        .input-group:focus-within {
            border-color: #ffc107;
            box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.1);
        }

        .input-group-text {
            background: #0f172a;
            border: none;
            color: #ffc107;
            padding: 12px 15px;
        }

        .form-control {
            border: none;
            padding: 12px 15px;
            font-size: 14px;
            background: #0f172a;
            color: #e2e8f0;
        }

        .form-control:focus {
            box-shadow: none;
            outline: none;
            background: #0f172a;
            color: white;
        }

        .form-control::placeholder {
            color: #64748b;
        }

        .btn-login {
            background: linear-gradient(135deg, #ffc107 0%, #e6a800 100%);
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
            color: #1a1a2e;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(255, 193, 7, 0.4);
            background: linear-gradient(135deg, #ffce3a 0%, #ffc107 100%);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        hr {
            border: none;
            height: 1px;
            background: linear-gradient(to right, transparent, #ffc107, transparent);
            margin: 25px 0;
        }

        .text-center p {
            color: #94a3b8;
        }

        .text-center a {
            color: #ffc107;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .text-center a:hover {
            color: #ffce3a;
            text-decoration: underline;
        }

        .alert {
            border-radius: 10px;
            border: none;
            font-size: 14px;
            animation: slideIn 0.3s ease-out;
            margin-bottom: 25px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
            color: #ffc107;
            border-left: 4px solid #ffc107;
        }

        .alert-danger {
            background: linear-gradient(135deg, #2d1a1a 0%, #1a1a2e 100%);
            color: #f87171;
            border-left: 4px solid #f87171;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <i class="fas fa-store fa-3x mb-3"></i>
        <h2>KinalApp</h2>
        <p>Sistema de Ventas</p>
    </div>
    <div class="login-body">
        <div th:if="${logout}" class="alert alert-success">
            <i class="fas fa-check-circle me-2"></i> Sesión cerrada correctamente.
        </div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}">
            <i class="fas fa-exclamation-circle me-2"></i> Error
        </div>

        <form action="/login" method="post">
            <!-- TOKEN CSRF - OBLIGATORIO -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" class="form-control" required autofocus placeholder="Ingresa tu usuario">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" required placeholder="Ingresa tu contraseña">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-login">
                <i class="fas fa-sign-in-alt me-2"></i> Iniciar Sesión
            </button>
        </form>

        <hr>

        <div class="text-center">
            <p style="color: #64748b; font-size: 13px;">
                <i class="fas fa-lock me-1"></i> Acceso restringido al personal autorizado
            </p>
            <p style="color: #64748b; font-size: 12px; margin-top: 10px;">
                Credenciales: user/12345 | admin/admin
            </p>
        </div>
    </div>
</div>
</body>
</html>
