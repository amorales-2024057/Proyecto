<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
<div th:replace="layout :: navbar"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3 th:text="${titulo}">Formulario</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{${accion == 'guardar' ? '/web/productos/guardar' : '/web/productos/actualizar/' + producto.codigoProducto}}"
                          th:object="${producto}" method="post">

                        <div class="mb-3" th:if="${accion == 'actualizar'}">
                            <label class="form-label">Código</label>
                            <input type="text" class="form-control" th:value="*{codigoProducto}" readonly>
                        </div>

                        <div class="mb-3">
                            <label for="nombreProducto" class="form-label">Nombre del Producto</label>
                            <input type="text" class="form-control" id="nombreProducto"
                                   th:field="*{nombreProducto}" required>
                        </div>

                        <div class="mb-3">
                            <label for="precio" class="form-label">Precio</label>
                            <input type="number" step="0.01" class="form-control" id="precio"
                                   th:field="*{precio}" required>
                        </div>

                        <div class="mb-3">
                            <label for="stock" class="form-label">Stock</label>
                            <input type="number" class="form-control" id="stock"
                                   th:field="*{stock}" required>
                        </div>

                        <div class="mb-3">
                            <label for="estado" class="form-label">Estado</label>
                            <select class="form-control" id="estado" th:field="*{estado}">
                                <option th:value="1">Activo</option>
                                <option th:value="0">Inactivo</option>
                            </select>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Guardar
                            </button>
                            <a th:href="@{/web/productos}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="layout :: footer"></div>
<div th:replace="layout :: scripts"></div>
</body>
</html>
