<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
<div th:replace="layout :: navbar"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 th:text="${titulo}">Lista de Productos</h1>
        <a th:href="@{/web/productos/nuevo}" class="btn btn-primary">
            <i class="fas fa-plus"></i> Nuevo Producto
        </a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>Código</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="producto : ${productos}">
                <td th:text="${producto.codigoProducto}">1</td>
                <td th:text="${producto.nombreProducto}">Producto</td>
                <td th:text="${'Q' + producto.precio}">Q10.00</td>
                <td th:text="${producto.stock}">100</td>
                <td>
                    <span th:if="${producto.estado == 1}" class="badge bg-success">Activo</span>
                    <span th:if="${producto.estado == 0}" class="badge bg-danger">Inactivo</span>
                </td>
                <td>
                    <a th:href="@{/web/productos/editar/{codigo}(codigo=${producto.codigoProducto})}"
                       class="btn btn-sm btn-warning">
                        <i class="fas fa-edit"></i>
                    </a>
                    <a th:href="@{/web/productos/eliminar/{codigo}(codigo=${producto.codigoProducto})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Estás seguro de eliminar este producto?')">
                        <i class="fas fa-trash"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${productos.empty}">
                <td colspan="6" class="text-center">No hay productos registrados</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="layout :: footer"></div>
<div th:replace="layout :: scripts"></div>
</body>
</html>
